<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="sass/style.css">
</head>
<body>
<div class="credit-card-wrap">
	<div class="mk-icon-world-map"></div>
	<div class="credit-card-inner">
		<div class="">
			<div class="credit-logo d-flex justify-content-between align-items-center">
				<div class="shape">
					<img src="img/mastercard.svg" alt="">
				</div> 
				<span class="text">Active</span>
			</div>
		</div>
		<div class="mk-icon-sim"></div>
		<div class="credit-font credit-card-number">
			<span class="title mb-0">Number</span>
			<p>4358 7421 9256 6682</p>
		</div>
		<div class="d-flex justify-content-between align-items-start">
			<div class="credit-card-date">
				<span class="title">Expires End</span>
				<span class="credit-font">11/23</span>
			</div>
			<div class="credit-font credit-author">
				<span class="title">Name</span>
				<span class="credit-font">John Snow</span>
			</div>
		</div>
	</div>
</div>
</body>
</html>
